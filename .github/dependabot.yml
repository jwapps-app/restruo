version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns: ["*"]

  # The base image is grouped too, but a Python minor bump (3.12 -> 3.13) is a
  # real change to the runtime — keep those PRs separate from patch updates.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    groups:
      base-image-patches:
        patterns: ["*"]
        update-types: ["patch"]
