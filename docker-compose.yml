services:
  restack:
    build: .
    # image: ghcr.io/jwapps-app/restack:latest   # once a prebuilt image is published
    container_name: restack
    ports:
      - "${RESTACK_PORT:-8080}:8080"
    volumes:
      - ${RESTACK_CONFIG:-./config.yaml}:/config/config.yaml:ro
      - ${RESTACK_DATA:-./data}:/data
    environment:
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:?set DASHBOARD_PASSWORD in .env or the stack environment}
    restart: unless-stopped
