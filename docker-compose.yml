services:
  restruo:
    build: .
    # image: ghcr.io/jwapps-app/restruo:latest   # once a prebuilt image is published
    container_name: restruo
    ports:
      - "${RESTRUO_PORT:-8080}:8080"
    volumes:
      # Named volume holds the instance list added via the settings UI.
      # Swap for a bind mount (/some/host/path:/data) if you want it on a share.
      - restruo-data:/data
      # Optional: mount a config file to override defaults (see config.example.yaml)
      # - /volume1/docker/restruo/config.yaml:/config/config.yaml:ro
    environment:
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:?set DASHBOARD_PASSWORD in the stack environment}
      # - RESTRUO_USERNAME=admin
      # - RESTRUO_TITLE=Restruo
    restart: unless-stopped

volumes:
  restruo-data:
