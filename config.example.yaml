# Restruo configuration — ENTIRELY OPTIONAL.
# Without a config file, defaults apply: auth enabled (RESTRUO_USERNAME/"admin" +
# DASHBOARD_PASSWORD), title from RESTRUO_TITLE, update checks every 6h.
# Mount a copy at /config/config.yaml only to override those.
#
# Portainer instances are managed from the dashboard's "⚙ Instances" settings
# page and stored in /data/instances.json — you normally don't list them here.
# The optional `instances:` block below is a SEED: it is imported into the
# store on first start (when /data/instances.json doesn't exist yet), then
# ignored. Useful for pre-provisioning with API tokens.
#
# instances:
#   - name: "Machine A (prod)"
#     base_url: "https://portainer-a.example.lan:9443"
#     api_key: "ptr_xxxxxxxxxxxxxxxxxxxxxxxxxxxx"
#     verify_tls: false        # false for self-signed certs (common in home labs)

# Update checks: images on a floating tag are compared against the registry;
# anything else (mariadb:11, digest pins) is skipped and shown as "pinned".
updates:
  enabled: true
  interval_hours: 6
  # Tags treated as rolling. Add others if you run projects that ship on them,
  # e.g. immich's :release. Equivalent to RESTRUO_FLOATING_TAGS.
  floating_tags: ["latest"]

ui:
  title: "Restruo"
  # Seconds between automatic refreshes of an open dashboard (0 disables).
  refresh_seconds: 180
  auth:
    enabled: true
    username: "admin"
    password_env: "DASHBOARD_PASSWORD"   # password comes from this env var, never from this file
